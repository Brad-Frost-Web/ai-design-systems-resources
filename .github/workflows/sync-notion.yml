name: Sync Notion Database

on:
  # Run on a schedule (every 6 hours)
  schedule:
    - cron: '0 */6 * * *'
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:
  # Allow webhook trigger via repository_dispatch
  repository_dispatch:
    types: [notion-update]

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Sync from Notion
        run: npm run sync
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}

      - name: Open a PR with the synced changes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # main is a protected branch, so we can't push to it directly.
          # Instead, push the sync to a rolling branch and open/update a PR.

          # Nothing changed? Then there's nothing to sync — exit cleanly.
          if [ -z "$(git status --porcelain -- _data/resources/)" ]; then
            echo "No Notion changes to sync."
            exit 0
          fi

          BRANCH="automated/notion-sync"
          git checkout -B "$BRANCH"
          git add -A _data/resources/
          git commit -m "Sync resources from Notion [automated]"
          git push --force-with-lease origin "$BRANCH"

          # Open a PR only if one isn't already open for this branch;
          # otherwise the force-push above has already updated the existing PR.
          if [ -z "$(gh pr list --head "$BRANCH" --state open --json number --jq '.[].number')" ]; then
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "Sync resources from Notion [automated]" \
              --body "Automated Notion → site sync. Review and merge to publish to the live site."
          else
            echo "PR for $BRANCH already open; updated it with the latest sync."
          fi
